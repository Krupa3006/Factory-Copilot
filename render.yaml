services:
  - type: web
    name: factory-copilot-api
    env: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: MODEL_PATH
        value: ml/model.pkl
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: factory-copilot-dashboard
    env: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements-dashboard.txt
    startCommand: streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    autoDeploy: true
    envVars:
      - key: API_URL
        sync: false
      - key: PUBLIC_API_BASE_URL
        sync: false
      - key: VAPI_PUBLIC_KEY
        sync: false
      - key: VAPI_ASSISTANT_ID
        sync: false
      - key: GITHUB_REPO_URL
        sync: false
      - key: LINKEDIN_POST_URL
        sync: false
